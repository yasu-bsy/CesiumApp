<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Tree Risk Assessment</title>
    <!-- CesiumJS の CSS と JS を読み込む -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #controlPanel {
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 0;
            border-radius: 5px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 100;
            max-width: 300px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            user-select: none;
        }
        #panelHeader {
            background-color: #4CAF50;
            color: white;
            padding: 12px 15px;
            border-radius: 5px 5px 0 0;
            cursor: move;
            font-weight: bold;
            user-select: none;
        }
        #panelContent {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #entityInfo {
            max-height: 420px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 5px;
            flex: 1;
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }
        #entityInfo p {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            cursor: text;
            margin: 5px 0;
            padding: 3px;
            border-radius: 3px;
        }
        #entityInfo p:hover {
            background-color: rgba(76, 175, 80, 0.1);
        }
        #entityInfo::-webkit-scrollbar {
            width: 8px;
        }
        #entityInfo::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        #entityInfo::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        #entityInfo::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        #controlPanel h3 {
            margin: 0;
            font-size: 14px;
            display: none;
        }
        #buttonContainer {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-shrink: 0;
        }
        #shareContainer {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
            flex-shrink: 0;
        }
        #shareContainer button {
            width: 100%;
        }
        #shareUrlOutput {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }
        #languageContainer {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-shrink: 0;
        }
        #languageContainer button {
            flex: 1;
            padding: 8px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        #languageContainer button:hover {
            background-color: #1976D2;
        }
        #languageContainer button.active {
            background-color: #ff9800;
        }
        #controlPanel button {
            flex: 1;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #controlPanel button:hover {
            background-color: #45a049;
        }

        /* 画像フローティングパネル */
        #imageModal {
            display: none;
            position: fixed;
            top: 80px;
            right: 60px;
            background: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.7);
            z-index: 1000;
            flex-direction: column;
            user-select: none;
            width: 520px;
            height: 400px;
            min-width: 260px;
            min-height: 180px;
            resize: both;
            overflow: hidden;
        }
        #imageModal.active {
            display: flex;
        }
        #imageModalHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #333;
            border-radius: 8px 8px 0 0;
            padding: 8px 12px;
            cursor: move;
            user-select: none;
        }
        #imageModalTitle {
            color: #ddd;
            font-size: 13px;
            pointer-events: none;
        }
        #imageModalClose {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #555;
            color: #fff;
            border: none;
            font-size: 14px;
            line-height: 22px;
            text-align: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: 10px;
        }
        #imageModalClose:hover {
            background: #e53935;
        }
        #imageModalBody {
            padding: 8px;
            flex: 1;
            overflow: hidden;
        }
        #imageModalBody img {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <!-- 画像フローティングパネル -->
    <div id="imageModal">
        <div id="imageModalHeader">
            <div id="imageModalTitle"></div>
            <div id="imageModalClose" title="閉じる">&#x2715;</div>
        </div>
        <div id="imageModalBody">
            <img id="imageModalImg" src="" alt="snapshot">
        </div>
    </div>

    <div id="controlPanel">
        <div id="panelHeader">選択中のアセット</div>
        <div id="panelContent">
            <div id="languageContainer">
                <button id="langJa" class="active" onclick="switchLanguage('ja')">日本語</button>
                <button id="langEn" onclick="switchLanguage('en')">English</button>
            </div>
            <div id="entityInfo"></div>
            <div id="buttonContainer">
                <button id="prevButton" onclick="goToPreviousEntity()">前へ</button>
                <button id="nextButton" onclick="goToNextEntity()">次へ</button>
            </div>
            <div id="shareContainer">
                <button id="shareUrlButton" onclick="createShareUrl()">共有URLを作成</button>
                <input id="shareUrlOutput" type="text" readonly>
            </div>
        </div>
    </div>
    <script>
        // アクセストークンの設定
        Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiOGQ2OThiZS1hZDkzLTQ4MjktYTZjMC0zZTJiOTZkOWI2OWQiLCJpZCI6MjUyOTUyLCJzdWIiOiJZYXN1c2hpIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlRyZWUgUmlzayBBc3Nlc3NtZW50IiwiaWF0IjoxNzgxMjQzNzk5fQ.ZXeoSgsZYAA5dt2EmqdxAhRY8XUCUZQ7viJKCOASc5o";

        // ビューアーの初期化
        const viewer = new Cesium.Viewer("cesiumContainer", { 
            shadows: false, // シャドウを無効にする
            requestRenderMode: true, // レンダリングを必要なときにのみ行う
            maximumRenderFrameRate: 30 // 最大フレームレートを設定
        });

        function normalizeScoreValue(rawValue) {
            const score = Number(rawValue);
            if (Number.isInteger(score) && score >= 1 && score <= 5) {
                return score;
            }
            return '';
        }

        function encodeStateForUrl(stateObject) {
            const json = JSON.stringify(stateObject);
            const bytes = new TextEncoder().encode(json);
            let binary = '';
            bytes.forEach(function(byte) {
                binary += String.fromCharCode(byte);
            });
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }

        function decodeStateFromUrl(encoded) {
            if (!encoded) {
                return null;
            }

            try {
                const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
                const padding = base64.length % 4 === 0 ? '' : '='.repeat(4 - (base64.length % 4));
                const binary = atob(base64 + padding);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                const json = new TextDecoder().decode(bytes);
                return JSON.parse(json);
            } catch (e) {
                console.warn('共有URLの復元に失敗しました:', e);
                return null;
            }
        }

        function getSharedStateFromLocation() {
            const rawHash = window.location.hash || '';
            if (!rawHash.startsWith('#state=')) {
                return null;
            }
            const encoded = rawHash.slice('#state='.length);
            return decodeStateFromUrl(encoded);
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return true;
            }

            const tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(tempInput);
            return copied;
        }

        async function initCesium() {
            try {
                const sharedState = getSharedStateFromLocation();

                // Cesium World Terrainを設定
                viewer.terrainProvider = await Cesium.CesiumTerrainProvider.fromIonAssetId(1, {
                    requestVertexNormals: true
                });
                // Google Photorealistic 3D Tiles を読み込む（クリッピングが機能しないため無効）
                // const tileset = await Cesium.createGooglePhotorealistic3DTileset();
                // viewer.scene.primitives.add(tileset);
                // tileset.maximumMemoryUsage = 1024; // メモリ使用量の上限を設定 (MB)
                
                // 1. 点群 (3D Tileset) の読み込み
                const pointCloud = await Cesium.Cesium3DTileset.fromIonAssetId(4886764,{
                    maximumMemoryUsage: 512, // メモリ使用量の上限を設定 (MB)
                });
                viewer.scene.primitives.add(pointCloud);
                await viewer.zoomTo(pointCloud);
                pointCloud.style = new Cesium.Cesium3DTileStyle({ pointSize: '5.0' });

                // 2. GeoJSON の読み込み
                // const resource = await Cesium.IonResource.fromAssetId(4886763);
                const resource = await Cesium.IonResource.fromAssetId(5039267);
                // await viewer.zoomTo(resource);

                const dataSource = await Cesium.GeoJsonDataSource.load(resource, {
                    stroke: Cesium.Color.YELLOW,
                    fill: Cesium.Color.YELLOW.withAlpha(0.4),
                    clampToGround: true
                });
                await viewer.dataSources.add(dataSource);

                // GeoJSONエンティティにボタンを追加
                const entities = dataSource.entities.values;
                const entityByFdId = {}; // _FD_IDをキーとしたエンティティマップ
                const initialScoresByFdId = {};
                
                for (let i = 0; i < entities.length; i++) {
                    const entity = entities[i];
                    const entityId = entity.id || `entity_${i}`;
                    
                    // _FD_IDを取得してマップに追加
                    if (entity.properties && entity.properties._FD_ID !== undefined) {
                        const fdIdProperty = entity.properties._FD_ID;
                        const rawFdId = (fdIdProperty && typeof fdIdProperty.getValue === 'function')
                            ? fdIdProperty.getValue(Cesium.JulianDate.now())
                            : fdIdProperty;

                        if (rawFdId !== undefined && rawFdId !== null && rawFdId !== '') {
                            const numericFdId = Number(rawFdId);
                            const fdId = Number.isNaN(numericFdId) ? String(rawFdId) : numericFdId;
                            entityByFdId[fdId] = entity;
                            entity._storeFdId = fdId; // エンティティに_FD_IDを保存
                            initialScoresByFdId[fdId] = {
                                _Jukei: normalizeScoreValue(entity.properties && entity.properties._Jukei ? entity.properties._Jukei.getValue(Cesium.JulianDate.now()) : ''),
                                _Jusei: normalizeScoreValue(entity.properties && entity.properties._Jusei ? entity.properties._Jusei.getValue(Cesium.JulianDate.now()) : '')
                            };
                        }
                    }
                    
                    // 既存の属性情報をテーブルとして構築
                    let propertiesHtml = '';
                    if (entity.properties) {
                        propertiesHtml = '<table style="width: 100%; border-collapse: collapse;">';
                        for (const key in entity.properties) {
                            const value = entity.properties[key];
                            propertiesHtml += `
                                <tr>
                                    <td style="border: 1px solid #ddd; padding: 8px; font-weight: bold; width: 40%;">${key}</td>
                                    <td style="border: 1px solid #ddd; padding: 8px;">${value}</td>
                                </tr>
                            `;
                        }
                        propertiesHtml += '</table>';
                    }
                    
                    // InfoBoxを表示しない（空に設定）
                    entity.description = '';
                    // 属性情報をエンティティに保存（パネルで表示用）
                    entity._properties = entity.properties;
                }

                // ドラッグ可能な機能を追加
                let isDragging = false;
                let offsetX = 0;
                let offsetY = 0;
                const panel = document.getElementById('controlPanel');
                const panelHeader = document.getElementById('panelHeader');

                panelHeader.addEventListener('mousedown', function(e) {
                    isDragging = true;
                    const rect = panel.getBoundingClientRect();
                    offsetX = e.clientX - rect.left;
                    offsetY = e.clientY - rect.top;
                });

                document.addEventListener('mousemove', function(e) {
                    if (isDragging) {
                        panel.style.left = (e.clientX - offsetX) + 'px';
                        panel.style.top = (e.clientY - offsetY) + 'px';
                        panel.style.right = 'auto'; // rightを削除してleftを優先させる
                    }
                });

                document.addEventListener('mouseup', function() {
                    isDragging = false;
                });

                // Propertyマッピング定義
                const propertyMappingJa = {
                    '_FD_ID': 'ID',
                    '_FD_TreeCrow': '枝張り(m)',
                    '_FD_TreeTru1': '樹幹長(m)',
                    '_FD_TreeTrun': '幹径(m)',
                    '_FD_Inclinat': '傾き(°)',
                    '_FD_ZRange': '樹高(m)',
                    '_Jukei': '樹形',
                    '_Jusei': '樹勢',
                    '_RISK_LEVEL': '危険度',
                    '_AIM_LTIME': '処理日時',
                    '_AIM_LUSER': '確認者'
                };

                const propertyMappingEn = {
                    '_FD_ID': 'ID',
                    '_FD_TreeCrow': 'Tree Crown Diameter(m)',
                    '_FD_TreeTru1': 'Tree Trunk Height(m)',
                    '_FD_TreeTrun': 'Tree Trunk Diameter(m)',
                    '_FD_Inclinat': 'Inclination Trunk(°)',
                    '_FD_ZRange': 'Tree Height(m)',
                    '_Jukei': 'Tree Shape',
                    '_Jusei': 'Tree Vigor',
                    '_RISK_LEVEL': 'Risk Level',
                    '_AIM_LTIME': 'Analysis Date',
                    '_AIM_LUSER': 'User'
                };

                const propertyOrder = ['_FD_ID', '_FD_TreeCrow', '_FD_TreeTru1', '_FD_TreeTrun', '_FD_Inclinat', '_FD_ZRange', '_Jukei', '_Jusei', '_RISK_LEVEL'];
                
                // 言語設定（グローバル変数）
                window.currentLanguage = 'ja';
                window.propertyMappingJa = propertyMappingJa;
                window.propertyMappingEn = propertyMappingEn;
                window.propertyOrder = propertyOrder;

                // グローバル変数にマップを保存
                window.entityByFdId = entityByFdId;
                window.currentEntity = null;
                window.dataSource = dataSource;
                window.initialScoresByFdId = initialScoresByFdId;

                function getPropertyValue(property) {
                    if (property && typeof property.getValue === 'function') {
                        return property.getValue(Cesium.JulianDate.now());
                    }
                    return property;
                }

                function getFormattedPropertyValue(value) {
                    if (value === undefined || value === null) {
                        return '';
                    }

                    if (typeof value === 'number') {
                        return Math.round(value * 1000) / 1000;
                    }

                    if (typeof value === 'string' && value !== '' && !isNaN(value)) {
                        return Math.round(parseFloat(value) * 1000) / 1000;
                    }

                    return value;
                }

                function buildScoreSelect(fieldKey, currentValue) {
                    const normalized = Number(currentValue);
                    const selectedValue = Number.isInteger(normalized) && normalized >= 1 && normalized <= 5 ? normalized : null;
                    const optionsHtml = ['<option value=""></option>', ...[1, 2, 3, 4, 5].map(score => {
                        const isSelected = selectedValue === score ? ' selected' : '';
                        return `<option value="${score}"${isSelected}>${score}</option>`;
                    })];

                    return `<select onchange="updateCurrentEntityScore('${fieldKey}', this.value)" style="width: 100%; padding: 4px;">${optionsHtml.join('')}</select>`;
                }

                function getRiskLevelLabel(entity) {
                    const jukeiRaw = entity && entity.properties ? getPropertyValue(entity.properties._Jukei) : undefined;
                    const juseiRaw = entity && entity.properties ? getPropertyValue(entity.properties._Jusei) : undefined;
                    const jukei = Number(jukeiRaw);
                    const jusei = Number(juseiRaw);

                    const normalizedJukei = Number.isInteger(jukei) && jukei >= 1 && jukei <= 5 ? jukei : null;
                    const normalizedJusei = Number.isInteger(jusei) && jusei >= 1 && jusei <= 5 ? jusei : null;

                    if (normalizedJukei === null || normalizedJusei === null) {
                        return '';
                    }

                    const maxScore = Math.max(normalizedJukei, normalizedJusei);
                    if (maxScore <= 2) return 'Ⅰ';
                    if (maxScore === 3) return 'Ⅱ';
                    if (maxScore === 4) return 'Ⅲ';
                    if (maxScore === 5) return 'Ⅳ';
                    return '';
                }

                function getRiskColor(entity) {
                    const riskLevel = getRiskLevelLabel(entity);
                    if (riskLevel === 'Ⅰ') return Cesium.Color.DODGERBLUE;
                    if (riskLevel === 'Ⅱ') return Cesium.Color.LIMEGREEN;
                    if (riskLevel === 'Ⅲ') return Cesium.Color.GOLD;
                    if (riskLevel === 'Ⅳ') return Cesium.Color.RED;
                    return null;
                }

                function getEntityCenterPosition(entity) {
                    if (!entity) {
                        return null;
                    }

                    const now = Cesium.JulianDate.now();
                    if (entity.position && typeof entity.position.getValue === 'function') {
                        const position = entity.position.getValue(now);
                        if (position) {
                            return position;
                        }
                    }

                    if (entity.polygon && entity.polygon.hierarchy && typeof entity.polygon.hierarchy.getValue === 'function') {
                        const hierarchy = entity.polygon.hierarchy.getValue(now);
                        if (hierarchy && hierarchy.positions && hierarchy.positions.length > 0) {
                            const center = new Cesium.Cartesian3();
                            for (const pos of hierarchy.positions) {
                                Cesium.Cartesian3.add(center, pos, center);
                            }
                            return Cesium.Cartesian3.multiplyByScalar(center, 1 / hierarchy.positions.length, center);
                        }
                    }

                    return null;
                }

                let riskRingEntities = [];

                function clearRiskRings() {
                    riskRingEntities.forEach(ring => viewer.entities.remove(ring));
                    riskRingEntities = [];
                }

                function addRiskRingsForEntity(entity) {
                    const riskColor = getRiskColor(entity);
                    if (!riskColor) {
                        return;
                    }

                    const centerPosition = getEntityCenterPosition(entity);
                    if (!centerPosition) {
                        return;
                    }

                    const innerFill = viewer.entities.add({
                        position: centerPosition,
                        ellipse: {
                            semiMajorAxis: 1.95,
                            semiMinorAxis: 1.95,
                            material: riskColor.withAlpha(0.28),
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                            zIndex: 20
                        }
                    });

                    const middleFill = viewer.entities.add({
                        position: centerPosition,
                        ellipse: {
                            semiMajorAxis: 3.6,
                            semiMinorAxis: 3.6,
                            material: riskColor.withAlpha(0.16),
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                            zIndex: 19
                        }
                    });

                    const outerOutline = viewer.entities.add({
                        position: centerPosition,
                        ellipse: {
                            semiMajorAxis: 5.4,
                            semiMinorAxis: 5.4,
                            material: Cesium.Color.TRANSPARENT,
                            outline: true,
                            outlineColor: riskColor.withAlpha(0.95),
                            outlineWidth: 3,
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                            zIndex: 18
                        }
                    });

                    riskRingEntities.push(innerFill, middleFill, outerOutline);
                }

                function refreshAllRiskRings() {
                    clearRiskRings();
                    entities.forEach(entity => addRiskRingsForEntity(entity));
                }

                function setEntityScoreValue(entity, fieldKey, scoreValue) {
                    if (!entity || !entity.properties) {
                        return;
                    }

                    const normalized = normalizeScoreValue(scoreValue);
                    const valueToSet = normalized === '' ? '' : normalized;
                    const targetProperty = entity.properties[fieldKey];

                    if (targetProperty && typeof targetProperty.setValue === 'function') {
                        targetProperty.setValue(valueToSet);
                        return;
                    }

                    if (typeof entity.properties.addProperty === 'function' && entity.properties[fieldKey] === undefined) {
                        entity.properties.addProperty(fieldKey, new Cesium.ConstantProperty(valueToSet));
                        return;
                    }

                    entity.properties[fieldKey] = valueToSet;
                }

                function getShareStatePayload() {
                    const changedScores = {};

                    entities.forEach(function(entity) {
                        if (entity._storeFdId === undefined || entity._storeFdId === null) {
                            return;
                        }

                        const fdId = String(entity._storeFdId);
                        const currentJukei = normalizeScoreValue(getPropertyValue(entity.properties._Jukei));
                        const currentJusei = normalizeScoreValue(getPropertyValue(entity.properties._Jusei));
                        const initial = window.initialScoresByFdId && window.initialScoresByFdId[fdId]
                            ? window.initialScoresByFdId[fdId]
                            : { _Jukei: '', _Jusei: '' };

                        if (currentJukei !== initial._Jukei || currentJusei !== initial._Jusei) {
                            changedScores[fdId] = {
                                _Jukei: currentJukei,
                                _Jusei: currentJusei
                            };
                        }
                    });

                    return {
                        v: 1,
                        lang: window.currentLanguage,
                        selectedFdId: window.currentEntity && window.currentEntity._storeFdId !== undefined
                            ? String(window.currentEntity._storeFdId)
                            : '',
                        scores: changedScores
                    };
                }

                function applySharedStateToEntities(state) {
                    if (!state || typeof state !== 'object') {
                        return;
                    }

                    if (state.scores && typeof state.scores === 'object') {
                        Object.keys(state.scores).forEach(function(fdIdKey) {
                            const entity = window.entityByFdId[fdIdKey] || window.entityByFdId[Number(fdIdKey)];
                            const scoreSet = state.scores[fdIdKey];

                            if (!entity || !scoreSet || typeof scoreSet !== 'object') {
                                return;
                            }

                            setEntityScoreValue(entity, '_Jukei', scoreSet._Jukei);
                            setEntityScoreValue(entity, '_Jusei', scoreSet._Jusei);
                        });
                    }
                }

                function renderEntityInfo(entity) {
                    const entityInfo = document.getElementById('entityInfo');
                    let infoHtml = '';

                    if (entity && entity.properties) {
                        const propertyMapping = window.currentLanguage === 'ja' ? window.propertyMappingJa : window.propertyMappingEn;
                        infoHtml += '<table style="width: 100%; border-collapse: collapse;">';

                        window.propertyOrder.forEach(key => {
                            const isEditableScoreField = key === '_Jukei' || key === '_Jusei';
                            const isRiskField = key === '_RISK_LEVEL';
                            if (entity.properties[key] !== undefined || isEditableScoreField || isRiskField) {
                                const rawValue = entity.properties[key] !== undefined ? getPropertyValue(entity.properties[key]) : undefined;
                                const value = getFormattedPropertyValue(rawValue);
                                const displayName = propertyMapping[key] || key;
                                const valueHtml = isRiskField
                                        ? getRiskLevelLabel(entity)
                                    : isEditableScoreField
                                        ? buildScoreSelect(key, value)
                                        : value;

                                infoHtml += `
                                    <tr>
                                        <td style="border: 1px solid #ddd; padding: 8px; font-weight: bold; width: 40%;">${displayName}</td>
                                        <td style="border: 1px solid #ddd; padding: 8px;">${valueHtml}</td>
                                    </tr>
                                `;
                            }
                        });

                        infoHtml += '</table>';
                    }

                    entityInfo.innerHTML = infoHtml;
                }

                window.updateCurrentEntityScore = function(fieldKey, newValue) {
                    if (!window.currentEntity || !window.currentEntity.properties) {
                        return;
                    }

                    if (fieldKey !== '_Jukei' && fieldKey !== '_Jusei') {
                        return;
                    }

                    if (newValue === '') {
                        setEntityScoreValue(window.currentEntity, fieldKey, '');

                        renderEntityInfo(window.currentEntity);
                        refreshAllRiskRings();
                        viewer.scene.requestRender();
                        return;
                    }

                    const parsed = Number(newValue);
                    if (!Number.isInteger(parsed) || parsed < 1 || parsed > 5) {
                        return;
                    }

                    setEntityScoreValue(window.currentEntity, fieldKey, parsed);

                    renderEntityInfo(window.currentEntity);
                    refreshAllRiskRings();
                    viewer.scene.requestRender();
                };

                window.createShareUrl = async function() {
                    const payload = getShareStatePayload();
                    const encodedState = encodeStateForUrl(payload);
                    const shareUrl = window.location.origin + window.location.pathname + '#state=' + encodedState;
                    const output = document.getElementById('shareUrlOutput');
                    output.value = shareUrl;
                    output.style.display = 'block';

                    let copied = false;
                    try {
                        copied = await copyText(shareUrl);
                    } catch (e) {
                        copied = false;
                    }

                    if (copied) {
                        alert(window.currentLanguage === 'ja' ? '共有URLをクリップボードにコピーしました。' : 'Share URL copied to clipboard.');
                    } else {
                        alert(window.currentLanguage === 'ja' ? '共有URLを生成しました。下の欄からコピーしてください。' : 'Share URL created. Please copy it from the field below.');
                    }
                };

                // 画像ポップアップ処理
                const RAW_BASE = 'https://raw.githubusercontent.com/yasu-bsy/CesiumApp/main/Tree-risk-assessment/assets/';

                function openImageModal(fdId) {
                    const url = RAW_BASE + fdId + '_snapshot.jpg';
                    const modal = document.getElementById('imageModal');
                    const img = document.getElementById('imageModalImg');
                    const title = document.getElementById('imageModalTitle');
                    img.src = url;
                    title.textContent = 'ID: ' + fdId + '  スナップショット';
                    modal.classList.add('active');
                }

                function closeImageModal() {
                    const modal = document.getElementById('imageModal');
                    modal.classList.remove('active');
                    document.getElementById('imageModalImg').src = '';
                }

                document.getElementById('imageModalClose').addEventListener('click', closeImageModal);
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') closeImageModal();
                });

                // 画像パネルのドラッグ
                (function() {
                    const panel = document.getElementById('imageModal');
                    const header = document.getElementById('imageModalHeader');
                    let dragging = false, ox = 0, oy = 0;
                    header.addEventListener('mousedown', function(e) {
                        dragging = true;
                        const rect = panel.getBoundingClientRect();
                        ox = e.clientX - rect.left;
                        oy = e.clientY - rect.top;
                        e.preventDefault();
                    });
                    document.addEventListener('mousemove', function(e) {
                        if (!dragging) return;
                        panel.style.left = (e.clientX - ox) + 'px';
                        panel.style.top  = (e.clientY - oy) + 'px';
                        panel.style.right = 'auto';
                    });
                    document.addEventListener('mouseup', function() { dragging = false; });
                })();

                // FD_IDに対応する画像が存在するかチェック（存在する場合のみポップアップ）
                window._snapshotCache = {};
                function tryShowSnapshot(fdId) {
                    if (window._snapshotCache[fdId] === true) {
                        openImageModal(fdId);
                        return;
                    }
                    if (window._snapshotCache[fdId] === false) return;
                    const url = RAW_BASE + fdId + '_snapshot.jpg';
                    const probe = new Image();
                    probe.onload = function() {
                        window._snapshotCache[fdId] = true;
                        openImageModal(fdId);
                    };
                    probe.onerror = function() {
                        window._snapshotCache[fdId] = false;
                    };
                    probe.src = url;
                }

                function isGeoJsonEntity(entity) {
                    return Cesium.defined(entity) && dataSource.entities.contains(entity);
                }

                function getGeoJsonEntityFromPickedObject(pickedObject) {
                    if (!Cesium.defined(pickedObject)) {
                        return null;
                    }

                    if (isGeoJsonEntity(pickedObject.id)) {
                        return pickedObject.id;
                    }

                    if (Cesium.defined(pickedObject.primitive) && isGeoJsonEntity(pickedObject.primitive.id)) {
                        return pickedObject.primitive.id;
                    }

                    return null;
                }

                applySharedStateToEntities(sharedState);
                refreshAllRiskRings();

                const defaultLeftClickAction = viewer.screenSpaceEventHandler.getInputAction(Cesium.ScreenSpaceEventType.LEFT_CLICK);
                viewer.screenSpaceEventHandler.setInputAction(function(movement) {
                    const pickedObjects = viewer.scene.drillPick(movement.position, 20) || [];

                    for (const pickedObject of pickedObjects) {
                        const pickedEntity = getGeoJsonEntityFromPickedObject(pickedObject);
                        if (pickedEntity) {
                            viewer.selectedEntity = pickedEntity;
                            viewer.scene.requestRender();
                            return;
                        }
                    }

                    if (defaultLeftClickAction) {
                        defaultLeftClickAction(movement);
                    }
                }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
                
                // エンティティ選択時のイベントリスナー
                viewer.selectedEntityChanged.addEventListener(function(entity) {
                    const panel = document.getElementById('controlPanel');
                    const panelHeader = document.getElementById('panelHeader');
                    
                    if (Cesium.defined(entity)) {
                        // 現在のカメラの角度を取得
                        const heading = viewer.camera.heading;
                        const pitch = viewer.camera.pitch;
                        
                        // 選択したエンティティに角度を維持したままズーム（rangeを小さくしてもっと近くズーム）
                        const range = 25; // ズーム距離（小さいほど近い）
                        viewer.zoomTo(entity, new Cesium.HeadingPitchRange(heading, pitch, range));
                        
                        // パネルを表示
                        panel.style.display = 'block';
                        window.currentEntity = entity;
                        
                        // ヘッダーに_FD_IDを表示
                        if (entity._storeFdId !== undefined) {
                            panelHeader.textContent = `選択中のエンティティ：${entity._storeFdId}`;
                        } else {
                            panelHeader.textContent = '選択中のエンティティ';
                        }
                        
                        // 属性情報を表示
                        renderEntityInfo(entity);

                        // _FD_IDに対応するスナップショット画像があれば表示
                        if (entity._storeFdId !== undefined) {
                            tryShowSnapshot(entity._storeFdId);
                        }
                    } else {
                        // パネルを非表示
                        panel.style.display = 'none';
                        window.currentEntity = null;
                    }
                });
                
                // 次へボタンクリック時の処理
                window.goToNextEntity = function() {
                    if (!window.currentEntity || window.currentEntity._storeFdId === undefined) {
                        alert('エンティティが選択されていません');
                        return;
                    }
                    
                    const currentFdId = window.currentEntity._storeFdId;
                    const nextFdId = currentFdId + 1;
                    
                    const nextEntity = window.entityByFdId[nextFdId];
                    if (nextEntity) {
                        viewer.selectedEntity = nextEntity;
                    } else {
                        alert('_FD_ID: ' + nextFdId + ' が見つかりません。次のエンティティはありません。');
                    }
                };

                // 前へボタンクリック時の処理
                window.goToPreviousEntity = function() {
                    if (!window.currentEntity || window.currentEntity._storeFdId === undefined) {
                        alert('エンティティが選択されていません');
                        return;
                    }
                    
                    const currentFdId = window.currentEntity._storeFdId;
                    const prevFdId = currentFdId - 1;
                    
                    const prevEntity = window.entityByFdId[prevFdId];
                    if (prevEntity) {
                        viewer.selectedEntity = prevEntity;
                    } else {
                        alert('_FD_ID: ' + prevFdId + ' が見つかりません。前のエンティティはありません。');
                    }
                };

                // 言語切り替え関数
                window.switchLanguage = function(lang) {
                    window.currentLanguage = lang;
                    
                    // ボタンのアクティブ状態を更新
                    const langJaBtn = document.getElementById('langJa');
                    const langEnBtn = document.getElementById('langEn');
                    
                    if (lang === 'ja') {
                        langJaBtn.classList.add('active');
                        langEnBtn.classList.remove('active');
                    } else {
                        langJaBtn.classList.remove('active');
                        langEnBtn.classList.add('active');
                    }
                    
                    // パネルヘッダーも言語に応じて更新
                    const panelHeader = document.getElementById('panelHeader');
                    if (lang === 'ja') {
                        panelHeader.textContent = window.currentEntity && window.currentEntity._storeFdId !== undefined 
                            ? `選択中のエンティティ：${window.currentEntity._storeFdId}`
                            : '選択中のエンティティ';
                    } else {
                        panelHeader.textContent = window.currentEntity && window.currentEntity._storeFdId !== undefined 
                            ? `Selected Entity: ${window.currentEntity._storeFdId}`
                            : 'Selected Entity';
                    }
                    
                    // 次へ・前へボタンのテキストを更新
                    const prevBtn = document.getElementById('prevButton');
                    const nextBtn = document.getElementById('nextButton');
                    if (lang === 'ja') {
                        prevBtn.textContent = '前へ';
                        nextBtn.textContent = '次へ';
                        document.getElementById('shareUrlButton').textContent = '共有URLを作成';
                    } else {
                        prevBtn.textContent = 'Previous';
                        nextBtn.textContent = 'Next';
                        document.getElementById('shareUrlButton').textContent = 'Create Share URL';
                    }
                    
                    // 現在のエンティティの情報を再表示
                    if (window.currentEntity) {
                        renderEntityInfo(window.currentEntity);
                    }
                };

                if (sharedState && sharedState.lang && (sharedState.lang === 'ja' || sharedState.lang === 'en')) {
                    window.switchLanguage(sharedState.lang);
                }

                if (sharedState && sharedState.selectedFdId) {
                    const selectedEntity = window.entityByFdId[sharedState.selectedFdId] || window.entityByFdId[Number(sharedState.selectedFdId)];
                    if (selectedEntity) {
                        viewer.selectedEntity = selectedEntity;
                    }
                }

            } catch (error) {
                console.log(error);
            }
        }

        initCesium();
    </script>
</body>
</html>
