<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Rutting Assessment - Clipped Point Cloud</title>
	<link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
	<script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
	<style>
		html, body, #clipViewer {
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
		}
		#hud {
			position: absolute;
			top: 12px;
			left: 12px;
			z-index: 20;
			padding: 10px 12px;
			background: rgba(255, 255, 255, 0.92);
			border-radius: 8px;
			font-family: "Segoe UI", sans-serif;
			font-size: 12px;
			line-height: 1.5;
			box-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
		}
		#hud button {
			margin-top: 8px;
			padding: 4px 8px;
			font-size: 12px;
		}
		#measureTable {
			margin-top: 8px;
			width: 100%;
			border-collapse: collapse;
			font-size: 12px;
		}
		#measureTable th,
		#measureTable td {
			border: 1px solid rgba(0, 0, 0, 0.2);
			padding: 3px 6px;
			text-align: left;
		}
		#measureTable th {
			background: rgba(0, 0, 0, 0.06);
		}
		#diagnosisSetBtn {
			display: block;
			width: 100%;
			margin-top: 8px;
		}
		#diagnosisSetBtn:disabled {
			background: #c8c8c8;
			color: #6e6e6e;
			border-color: #b5b5b5;
			cursor: not-allowed;
		}
		#diagnosisResult {
			margin-top: 6px;
			font-weight: 600;
		}
	</style>
</head>
<body>
	<div id="clipViewer"></div>
	<div id="hud">
		<div>矩形内の点群のみ表示中</div>
		<div id="sectionThicknessApplied">断面厚さ: -- mm</div>
		<button id="resetViewBtn" type="button">初期視野に戻す</button>
		<button id="invertBtn" type="button">内外を反転</button>
		<button id="deformBtn" type="button">デフォルメ OFF</button>
		<button id="measureBtn" type="button">距離計測 OFF</button>
		<div id="measureStatus">3点で垂線距離を測定します</div>
		<table id="measureTable" aria-label="計測結果">
			<thead>
				<tr>
					<th>項目</th>
					<th>値</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>D1</td>
					<td id="measureD1">--</td>
				</tr>
				<tr>
					<td>D2</td>
					<td id="measureD2">--</td>
				</tr>
			</tbody>
		</table>
		<button id="diagnosisSetBtn" type="button" disabled>診断区分セット</button>
		<div id="diagnosisResult">診断区分: --</div>
	</div>

	<script>
		Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiOGQ2OThiZS1hZDkzLTQ4MjktYTZjMC0zZTJiOTZkOWI2OWQiLCJpZCI6MjUyOTUyLCJzdWIiOiJZYXN1c2hpIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlRyZWUgUmlzayBBc3Nlc3NtZW50IiwiaWF0IjoxNzgxMjQzNzk5fQ.ZXeoSgsZYAA5dt2EmqdxAhRY8XUCUZQ7viJKCOASc5o";

		const viewer = new Cesium.Viewer("clipViewer", {
			animation: false,
			timeline: false,
			baseLayerPicker: false,
			geocoder: false,
			homeButton: false,
			navigationHelpButton: false,
			sceneModePicker: false,
			infoBox: false,
			selectionIndicator: false
		});

		viewer.scene.globe.show = false;
		viewer.scene.skyAtmosphere.show = false;
		viewer.scene.backgroundColor = Cesium.Color.fromCssColorString("#0a0d12");
		const popupHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
		let minOrthoWidth = 1.0;
		let maxOrthoWidth = 100.0;
		let measureEnabled = false;
		let measureStartPoint = null;
		let measureSecondPoint = null;
		let measureThirdPoint = null;
		let measureHoverPoint = null;
		let measurePointEntities = [];
		let measureLineEntity = null;
		let measurePerpendicularEntity = null;
		let measureLabelEntity = null;
		let activeMeasureTileset = null;
		let activeRectConfig = null;
		let clipInverted = false;
		let clipDeformed = false;
		let clipDeformMatrix = Cesium.Matrix4.clone(Cesium.Matrix4.IDENTITY, new Cesium.Matrix4());
		let clipDeformInverseMatrix = Cesium.Matrix4.clone(Cesium.Matrix4.IDENTITY, new Cesium.Matrix4());
		let applyExternalSectionThickness = null;
		let applyExternalPointSize = null;
		let pendingSectionThicknessMm = null;
		let pendingPointSize = null;
		let completedMeasurementCount = 0;
		const measureD1Cell = document.getElementById("measureD1");
		const measureD2Cell = document.getElementById("measureD2");
		const diagnosisSetBtn = document.getElementById("diagnosisSetBtn");
		const diagnosisResult = document.getElementById("diagnosisResult");
		let measureD1Mm = null;
		let measureD2Mm = null;

		window.addEventListener("message", function(event) {
			const data = event.data;
			if (!data) {
				return;
			}

			if (data.type === "updatePointSize") {
				const incomingPointSize = Number(data.pointSize);
				if (!Number.isFinite(incomingPointSize) || incomingPointSize <= 0) {
					return;
				}

				if (typeof applyExternalPointSize === "function") {
					applyExternalPointSize(incomingPointSize);
				} else {
					pendingPointSize = incomingPointSize;
				}
				return;
			}

			if (data.type !== "updateSectionThickness") {
				return;
			}

			const incomingThicknessMm = Number(data.sectionThicknessMm);
			if (!Number.isFinite(incomingThicknessMm)) {
				return;
			}

			if (typeof applyExternalSectionThickness === "function") {
				applyExternalSectionThickness(incomingThicknessMm);
			} else {
				pendingSectionThicknessMm = incomingThicknessMm;
			}
		});

		function parseRectanglePayload() {
			const params = new URLSearchParams(window.location.search);
			const raw = params.get("rect");
			if (!raw) {
				return null;
			}
			try {
				return JSON.parse(raw);
			} catch (error) {
				console.error("Invalid rect payload", error);
				return null;
			}
		}

		function vecFromArray(values) {
			return new Cesium.Cartesian3(values[0], values[1], values[2]);
		}

		function normalizeRectConfig(config) {
			if (!config || !Array.isArray(config.dimensions) || config.dimensions.length !== 3) {
				return config;
			}

			const explicitThicknessM = Number(config.sectionThicknessM);
			if (Number.isFinite(explicitThicknessM) && explicitThicknessM >= 0.05 && explicitThicknessM <= 0.3) {
				config.dimensions[1] = explicitThicknessM;
				return config;
			}

			const explicitThicknessMm = Number(config.sectionThicknessMm);
			if (Number.isFinite(explicitThicknessMm) && explicitThicknessMm >= 50 && explicitThicknessMm <= 300) {
				config.dimensions[1] = explicitThicknessMm / 1000;
				return config;
			}

			const legacyThicknessCm = Number(config.sectionThicknessCm);
			if (Number.isFinite(legacyThicknessCm) && legacyThicknessCm >= 5 && legacyThicknessCm <= 30) {
				config.dimensions[1] = legacyThicknessCm / 100;
			}

			return config;
		}

		function updateSectionThicknessHud(config) {
			const hud = document.getElementById("sectionThicknessApplied");
			if (!hud || !config || !Array.isArray(config.dimensions) || config.dimensions.length !== 3) {
				return;
			}
			const explicitThicknessM = Number(config.sectionThicknessM);
			const appliedMm = Number.isFinite(explicitThicknessM) ? explicitThicknessM * 1000 : config.dimensions[1] * 1000;
			hud.textContent = "断面厚さ: " + appliedMm.toFixed(1) + " mm";
		}

		function getPopupWorldPosition(screenPosition) {
			if (!screenPosition) {
				return null;
			}

			if (activeMeasureTileset) {
				const picked = viewer.scene.pick(screenPosition);
				if (!isPickFromActiveTileset(picked)) {
					return null;
				}
			}

			if (viewer.scene.pickPositionSupported) {
				const pickedPosition = viewer.scene.pickPosition(screenPosition);
				if (Cesium.defined(pickedPosition)) {
					return isPointVisibleForMeasurement(pickedPosition) ? pickedPosition : null;
				}
			}

			const ray = viewer.camera.getPickRay(screenPosition);
			if (!ray) {
				return null;
			}

			const globePick = viewer.scene.globe.pick(ray, viewer.scene);
			if (globePick) {
				return isPointVisibleForMeasurement(globePick) ? globePick : null;
			}

			const ellipsoidPick = viewer.camera.pickEllipsoid(screenPosition, viewer.scene.globe.ellipsoid);
			return isPointVisibleForMeasurement(ellipsoidPick) ? ellipsoidPick : null;
		}

		function isPickFromActiveTileset(picked) {
			if (!picked || !activeMeasureTileset) {
				return false;
			}

			if (picked.primitive === activeMeasureTileset || picked.tileset === activeMeasureTileset) {
				return true;
			}

			if (picked.content && picked.content.tileset === activeMeasureTileset) {
				return true;
			}

			return false;
		}

		function isPointVisibleForMeasurement(worldPoint) {
			if (!worldPoint) {
				return false;
			}
			if (!activeRectConfig) {
				return true;
			}

			const center = vecFromArray(activeRectConfig.center);
			const dimensions = vecFromArray(activeRectConfig.dimensions);
			const axisX = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisX), new Cesium.Cartesian3());
			const axisY = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisY), new Cesium.Cartesian3());
			const axisZ = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisZ), new Cesium.Cartesian3());

			let pointForTest = worldPoint;
			if (clipDeformed) {
				pointForTest = Cesium.Matrix4.multiplyByPoint(
					clipDeformInverseMatrix,
					worldPoint,
					new Cesium.Cartesian3()
				);
			}

			const delta = Cesium.Cartesian3.subtract(pointForTest, center, new Cesium.Cartesian3());
			const localX = Cesium.Cartesian3.dot(delta, axisX);
			const localY = Cesium.Cartesian3.dot(delta, axisY);
			const localZ = Cesium.Cartesian3.dot(delta, axisZ);

			const inside = Math.abs(localX) <= dimensions.x * 0.5 &&
				Math.abs(localY) <= dimensions.y * 0.5 &&
				Math.abs(localZ) <= dimensions.z * 0.5;

			return clipInverted ? !inside : inside;
		}

		function midpointCartesian(a, b) {
			return Cesium.Cartesian3.midpoint(a, b, new Cesium.Cartesian3());
		}

		function updateMeasureStatus(text) {
			document.getElementById("measureStatus").textContent = text;
		}

		function setMeasureResult(slotName, distanceMm) {
			const text = Number(distanceMm).toFixed(1) + " mm";
			if (slotName === "D1" && measureD1Cell) {
				measureD1Cell.textContent = text;
				measureD1Mm = Number(distanceMm);
				return;
			}
			if (slotName === "D2" && measureD2Cell) {
				measureD2Cell.textContent = text;
				measureD2Mm = Number(distanceMm);
			}
		}

		function updateDiagnosisButtonState() {
			const hasBoth = Number.isFinite(measureD1Mm) && Number.isFinite(measureD2Mm);
			if (diagnosisSetBtn) {
				diagnosisSetBtn.disabled = !hasBoth;
			}
			if (!hasBoth && diagnosisResult) {
				diagnosisResult.textContent = "診断区分: --";
			}
		}

		function getDiagnosisCategory(maxMm) {
			if (maxMm < 20.0) {
				return "診断区分Ⅰ";
			}
			if (maxMm < 40.0) {
				return "診断区分Ⅱ";
			}
			return "診断区分Ⅲ";
		}

		function applyDiagnosisFromD1D2() {
			if (!Number.isFinite(measureD1Mm) || !Number.isFinite(measureD2Mm)) {
				return;
			}
			const maxMm = Math.max(measureD1Mm, measureD2Mm);
			const diagnosis = getDiagnosisCategory(maxMm);
			if (diagnosisResult) {
				diagnosisResult.textContent = "診断区分: " + diagnosis + " (Max: " + maxMm.toFixed(1) + " mm)";
			}
			if (window.parent && window.parent !== window) {
				window.parent.postMessage({
					type: "setDiagnosisCategory",
					diagnosis: diagnosis,
					maxMm: maxMm,
					d1Mm: measureD1Mm,
					d2Mm: measureD2Mm
				}, "*");
			}
			updateMeasureStatus("診断区分を設定しました: " + diagnosis + " (Max " + maxMm.toFixed(1) + " mm)");
		}

		function recordCompletedMeasurement(distanceMm) {
			if (!Number.isFinite(distanceMm)) {
				return;
			}

			if (completedMeasurementCount === 0) {
				setMeasureResult("D1", distanceMm);
				completedMeasurementCount = 1;
				updateDiagnosisButtonState();
				updateMeasureStatus("1回目計測完了: D1 に " + distanceMm.toFixed(1) + " mm を入力しました");
				return;
			}

			if (completedMeasurementCount === 1) {
				setMeasureResult("D2", distanceMm);
				completedMeasurementCount = 2;
				updateDiagnosisButtonState();
				updateMeasureStatus("2回目計測完了: D2 に " + distanceMm.toFixed(1) + " mm を入力しました");
				return;
			}

			updateMeasureStatus("D1/D2 は入力済みです。必要ならウィンドウを閉じて再計測してください");
		}

		function clearMeasurementGraphics() {
			if (measureLineEntity) {
				viewer.entities.remove(measureLineEntity);
				measureLineEntity = null;
			}
			if (measurePerpendicularEntity) {
				viewer.entities.remove(measurePerpendicularEntity);
				measurePerpendicularEntity = null;
			}
			if (measureLabelEntity) {
				viewer.entities.remove(measureLabelEntity);
				measureLabelEntity = null;
			}
		}

		function clearMeasurementEntities() {
			measurePointEntities.forEach(function(entity) {
				viewer.entities.remove(entity);
			});
			measurePointEntities = [];
			clearMeasurementGraphics();
		}

		function resetMeasurementState(preserveStatus) {
			measureStartPoint = null;
			measureSecondPoint = null;
			measureThirdPoint = null;
			measureHoverPoint = null;
			clearMeasurementEntities();
			if (!preserveStatus) {
				updateMeasureStatus(measureEnabled ? "1点目をクリックしてください" : "3点で垂線距離を測定します");
			}
		}

		function addMeasurePoint(position, color) {
			const entity = viewer.entities.add({
				position: position,
				point: {
					pixelSize: 10,
					color: color,
					outlineColor: Cesium.Color.BLACK,
					outlineWidth: 1
				}
			});
			measurePointEntities.push(entity);
		}

		function projectPointOntoLine(point, lineStart, lineEnd) {
			const lineVector = Cesium.Cartesian3.subtract(lineEnd, lineStart, new Cesium.Cartesian3());
			const pointVector = Cesium.Cartesian3.subtract(point, lineStart, new Cesium.Cartesian3());
			const lineLengthSquared = Cesium.Cartesian3.magnitudeSquared(lineVector);
			if (lineLengthSquared < 0.000001) {
				return null;
			}

			const t = Cesium.Cartesian3.dot(pointVector, lineVector) / lineLengthSquared;
			const clampedT = Cesium.Math.clamp(t, 0.0, 1.0);
			return Cesium.Cartesian3.add(
				lineStart,
				Cesium.Cartesian3.multiplyByScalar(lineVector, clampedT, new Cesium.Cartesian3()),
				new Cesium.Cartesian3()
			);
		}

		function toMeasurementSpace(worldPoint) {
			if (!worldPoint) {
				return null;
			}
			if (!clipDeformed) {
				return Cesium.Cartesian3.clone(worldPoint, new Cesium.Cartesian3());
			}
			return Cesium.Matrix4.multiplyByPoint(
				clipDeformInverseMatrix,
				worldPoint,
				new Cesium.Cartesian3()
			);
		}

		function fromMeasurementSpace(measurementPoint) {
			if (!measurementPoint) {
				return null;
			}
			if (!clipDeformed) {
				return Cesium.Cartesian3.clone(measurementPoint, new Cesium.Cartesian3());
			}
			return Cesium.Matrix4.multiplyByPoint(
				clipDeformMatrix,
				measurementPoint,
				new Cesium.Cartesian3()
			);
		}

		function projectPointToSectionPlane(measurementPoint) {
			if (!measurementPoint || !activeRectConfig) {
				return measurementPoint ? Cesium.Cartesian3.clone(measurementPoint, new Cesium.Cartesian3()) : null;
			}

			const center = vecFromArray(activeRectConfig.center);
			const axisY = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisY), new Cesium.Cartesian3());
			const delta = Cesium.Cartesian3.subtract(measurementPoint, center, new Cesium.Cartesian3());
			const offsetAlongAxis = Cesium.Cartesian3.dot(delta, axisY);
			const alongComponent = Cesium.Cartesian3.multiplyByScalar(axisY, offsetAlongAxis, new Cesium.Cartesian3());
			return Cesium.Cartesian3.subtract(measurementPoint, alongComponent, new Cesium.Cartesian3());
		}

		function getProjectedMeasurementPoint(worldPoint) {
			const measurementPoint = toMeasurementSpace(worldPoint);
			return projectPointToSectionPlane(measurementPoint);
		}

		function calculatePerpendicularDistanceMm(startWorld, secondWorld, thirdWorld) {
			const measureStart = getProjectedMeasurementPoint(startWorld);
			const measureSecond = getProjectedMeasurementPoint(secondWorld);
			const measureThird = getProjectedMeasurementPoint(thirdWorld);
			if (!measureStart || !measureSecond || !measureThird) {
				return null;
			}

			const measureFootPoint = projectPointOntoLine(measureThird, measureStart, measureSecond);
			if (!measureFootPoint) {
				return null;
			}

			const distanceMeters = Cesium.Cartesian3.distance(measureThird, measureFootPoint);
			return distanceMeters * 1000.0;
		}

		function renderMeasurement() {
			clearMeasurementGraphics();

			if (!measureStartPoint) {
				return;
			}

			const activeSecondPoint = measureSecondPoint || measureHoverPoint;
			if (!activeSecondPoint) {
				viewer.scene.requestRender();
				return;
			}

			const measureStart = getProjectedMeasurementPoint(measureStartPoint);
			const measureSecond = getProjectedMeasurementPoint(activeSecondPoint);
			if (!measureStart || !measureSecond) {
				return;
			}
			const displayStart = fromMeasurementSpace(measureStart);
			const displaySecond = fromMeasurementSpace(measureSecond);

			measureLineEntity = viewer.entities.add({
				polyline: {
					positions: [displayStart, displaySecond],
					width: 3,
					material: Cesium.Color.CYAN,
					clampToGround: false
				}
			});

			if (!measureSecondPoint) {
				viewer.scene.requestRender();
				return;
			}

			const activeThirdPoint = measureThirdPoint || measureHoverPoint;
			if (!activeThirdPoint) {
				viewer.scene.requestRender();
				return;
			}

			const measureThird = getProjectedMeasurementPoint(activeThirdPoint);
			if (!measureThird) {
				return;
			}
			const measureFootPoint = projectPointOntoLine(measureThird, measureStart, measureSecond);
			if (!measureFootPoint) {
				updateMeasureStatus("1点目と2点目は離して選択してください");
				return;
			}

			const distanceMeters = Cesium.Cartesian3.distance(measureThird, measureFootPoint);
			const distanceMillimeters = distanceMeters * 1000.0;
			const displayThird = fromMeasurementSpace(measureThird);
			const displayFootPoint = fromMeasurementSpace(measureFootPoint);

			measurePerpendicularEntity = viewer.entities.add({
				polyline: {
					positions: [displayThird, displayFootPoint],
					width: 3,
					material: Cesium.Color.LIME,
					clampToGround: false
				}
			});

			measureLabelEntity = viewer.entities.add({
				position: displayThird,
				label: {
					text: distanceMillimeters.toFixed(1) + " mm",
					font: "16px Segoe UI",
					fillColor: Cesium.Color.WHITE,
					showBackground: true,
					backgroundColor: Cesium.Color.BLACK.withAlpha(0.7),
					pixelOffset: new Cesium.Cartesian2(0, 20),
					heightReference: Cesium.HeightReference.NONE
				}
			});

			updateMeasureStatus((measureThirdPoint ? "垂線距離(中央断面投影): " : "プレビュー距離(中央断面投影): ") + distanceMillimeters.toFixed(1) + " mm");
			viewer.scene.requestRender();
		}

		function configureMeasurementMode() {
			const measureButton = document.getElementById("measureBtn");
			if (diagnosisSetBtn) {
				diagnosisSetBtn.addEventListener("click", function() {
					applyDiagnosisFromD1D2();
				});
			}

			measureButton.addEventListener("click", function() {
				measureEnabled = !measureEnabled;
				measureButton.textContent = measureEnabled ? "距離計測 ON" : "距離計測 OFF";
				resetMeasurementState();
			});

			popupHandler.setInputAction(function(click) {
				if (!measureEnabled) {
					return;
				}

				const worldPosition = getPopupWorldPosition(click.position);
				if (!worldPosition) {
					updateMeasureStatus("点群上をクリックしてください");
					return;
				}

				if (!measureStartPoint || (measureStartPoint && measureSecondPoint && measureThirdPoint)) {
					resetMeasurementState(true);
					measureStartPoint = worldPosition;
					measureHoverPoint = null;
					addMeasurePoint(measureStartPoint, Cesium.Color.YELLOW);
					updateMeasureStatus("2点目をクリックしてください");
					viewer.scene.requestRender();
					return;
				}

				if (!measureSecondPoint) {
					measureSecondPoint = worldPosition;
					measureHoverPoint = null;
					addMeasurePoint(measureSecondPoint, Cesium.Color.ORANGE);
					updateMeasureStatus("3点目をクリックしてください");
					renderMeasurement();
					viewer.scene.requestRender();
					return;
				}

				measureThirdPoint = worldPosition;
				measureHoverPoint = null;
				addMeasurePoint(measureThirdPoint, Cesium.Color.LIME);
				renderMeasurement();
				const completedDistanceMm = calculatePerpendicularDistanceMm(
					measureStartPoint,
					measureSecondPoint,
					measureThirdPoint
				);
				recordCompletedMeasurement(completedDistanceMm);
			}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

			popupHandler.setInputAction(function(movement) {
				if (!measureEnabled || !measureStartPoint) {
					return;
				}

				measureHoverPoint = getPopupWorldPosition(movement.endPosition);
				renderMeasurement();
			}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
		}

		function buildBoxModelMatrix(config) {
			const center = vecFromArray(config.center);
			const axisX = Cesium.Cartesian3.normalize(vecFromArray(config.axisX), new Cesium.Cartesian3());
			const axisY = Cesium.Cartesian3.normalize(vecFromArray(config.axisY), new Cesium.Cartesian3());
			const axisZ = Cesium.Cartesian3.normalize(vecFromArray(config.axisZ), new Cesium.Cartesian3());
			const rotation = new Cesium.Matrix3(
				axisX.x, axisY.x, axisZ.x,
				axisX.y, axisY.y, axisZ.y,
				axisX.z, axisY.z, axisZ.z
			);
			return Cesium.Matrix4.fromRotationTranslation(rotation, center, new Cesium.Matrix4());
		}

		function buildClippingModelMatrixForTileset(config, tileset, referenceModelMatrix) {
			const worldBoxMatrix = buildBoxModelMatrix(config);
			if (!tileset || !tileset.root) {
				return worldBoxMatrix;
			}

			const modelMatrix = referenceModelMatrix || tileset.modelMatrix;
			const rootTransform = tileset.root.transform || Cesium.Matrix4.IDENTITY;
			const tilesetTransform = Cesium.Matrix4.multiply(
				modelMatrix,
				rootTransform,
				new Cesium.Matrix4()
			);

			const inverseTilesetMatrix = Cesium.Matrix4.inverse(
				tilesetTransform,
				new Cesium.Matrix4()
			);
			return Cesium.Matrix4.multiply(inverseTilesetMatrix, worldBoxMatrix, new Cesium.Matrix4());
		}

		function buildClippingPlanes(config, clipInsideBox) {
			const dimensions = vecFromArray(config.dimensions);
			const explicitThicknessM = Number(config.sectionThicknessM);
			const sectionThicknessM = Number.isFinite(explicitThicknessM)
				? Cesium.Math.clamp(explicitThicknessM, 0.05, 0.3)
				: dimensions.y;

			const hx = dimensions.x * 0.5;
			const hy = sectionThicknessM * 0.5;
			const hz = dimensions.z * 0.5;

			const insideHalfSpaces = [
				new Cesium.ClippingPlane(new Cesium.Cartesian3(1.0, 0.0, 0.0), hx),
				new Cesium.ClippingPlane(new Cesium.Cartesian3(-1.0, 0.0, 0.0), hx),
				new Cesium.ClippingPlane(new Cesium.Cartesian3(0.0, 1.0, 0.0), hy),
				new Cesium.ClippingPlane(new Cesium.Cartesian3(0.0, -1.0, 0.0), hy),
				new Cesium.ClippingPlane(new Cesium.Cartesian3(0.0, 0.0, 1.0), hz),
				new Cesium.ClippingPlane(new Cesium.Cartesian3(0.0, 0.0, -1.0), hz)
			];

			if (!clipInsideBox) {
				// Default mode: keep inside by clipping points that violate any face constraint.
				return {
					planes: insideHalfSpaces,
					unionClippingRegions: true
				};
			}

			// Invert mode: clip inside by using negated half-spaces and AND aggregation.
			const insideClipPlanes = insideHalfSpaces.map(function(plane) {
				return new Cesium.ClippingPlane(
					Cesium.Cartesian3.negate(plane.normal, new Cesium.Cartesian3()),
					-plane.distance
				);
			});

			return {
				planes: insideClipPlanes,
				unionClippingRegions: false
			};
		}

		function buildAxisRotationMatrix(config) {
			const axisX = Cesium.Cartesian3.normalize(vecFromArray(config.axisX), new Cesium.Cartesian3());
			const axisY = Cesium.Cartesian3.normalize(vecFromArray(config.axisY), new Cesium.Cartesian3());
			const axisZ = Cesium.Cartesian3.normalize(vecFromArray(config.axisZ), new Cesium.Cartesian3());
			const rotation3 = new Cesium.Matrix3(
				axisX.x, axisY.x, axisZ.x,
				axisX.y, axisY.y, axisZ.y,
				axisX.z, axisY.z, axisZ.z
			);
			return Cesium.Matrix4.fromRotationTranslation(rotation3, Cesium.Cartesian3.ZERO, new Cesium.Matrix4());
		}

		function buildDeformMatrix(config, widthScale, alongScale, heightScale) {
			const center = vecFromArray(config.center);
			const toCenter = Cesium.Matrix4.fromTranslation(center, new Cesium.Matrix4());
			const fromCenter = Cesium.Matrix4.fromTranslation(
				Cesium.Cartesian3.negate(center, new Cesium.Cartesian3()),
				new Cesium.Matrix4()
			);
			const rotation = buildAxisRotationMatrix(config);
			const rotationInv = Cesium.Matrix4.inverseTransformation(rotation, new Cesium.Matrix4());
			// x: road width direction (axisX), y: segment direction (axisY), z: height direction (axisZ)
			const scale = Cesium.Matrix4.fromScale(new Cesium.Cartesian3(widthScale, alongScale, heightScale), new Cesium.Matrix4());

			const result = new Cesium.Matrix4();
			Cesium.Matrix4.multiply(toCenter, rotation, result);
			Cesium.Matrix4.multiply(result, scale, result);
			Cesium.Matrix4.multiply(result, rotationInv, result);
			Cesium.Matrix4.multiply(result, fromCenter, result);
			return result;
		}

		function applyDeformation(tileset, baseModelMatrix, config, enabled) {
			if (!enabled) {
				tileset.modelMatrix = Cesium.Matrix4.clone(baseModelMatrix, new Cesium.Matrix4());
				return;
			}

			const widthScale = Number.isFinite(Number(config.deformWidthScale)) ? Number(config.deformWidthScale) : 0.45;
			const alongScale = Number.isFinite(Number(config.deformAlongScale)) ? Number(config.deformAlongScale) : 1.0;
			const heightScale = Number.isFinite(Number(config.deformHeightScale)) ? Number(config.deformHeightScale) : 2.2;
			const deformMatrix = buildDeformMatrix(config, widthScale, alongScale, heightScale);

			tileset.modelMatrix = Cesium.Matrix4.multiply(
				deformMatrix,
				baseModelMatrix,
				new Cesium.Matrix4()
			);
		}

		function focusAlongSegmentAxis(config) {
			const center = vecFromArray(config.center);
			const dimensions = vecFromArray(config.dimensions);
			const axisForward = Cesium.Cartesian3.normalize(vecFromArray(config.axisY), new Cesium.Cartesian3());
			const axisUp = Cesium.Cartesian3.normalize(vecFromArray(config.axisZ), new Cesium.Cartesian3());

			const maxDim = Math.max(dimensions.x, dimensions.y, dimensions.z);
			const backDistance = Math.max(maxDim * 8.0, 8.0);

			const backOffset = Cesium.Cartesian3.multiplyByScalar(axisForward, -backDistance, new Cesium.Cartesian3());
			const cameraPosition = Cesium.Cartesian3.add(center, backOffset, new Cesium.Cartesian3());

			const direction = Cesium.Cartesian3.subtract(center, cameraPosition, new Cesium.Cartesian3());
			Cesium.Cartesian3.normalize(direction, direction);

			const orthoFrustum = new Cesium.OrthographicFrustum();
			orthoFrustum.aspectRatio = Math.max(viewer.scene.canvas.clientWidth / Math.max(viewer.scene.canvas.clientHeight, 1), 0.1);
			const baseWidth = Math.max(dimensions.x, dimensions.z) * 1.8;
			minOrthoWidth = Math.max(Math.max(dimensions.x, dimensions.z) * 0.6, 0.5);
			maxOrthoWidth = Math.max(baseWidth * 30.0, 100.0);
			orthoFrustum.width = baseWidth;
			orthoFrustum.near = 0.1;
			orthoFrustum.far = Math.max(backDistance * 12.0, 2000.0);
			viewer.camera.frustum = orthoFrustum;

			viewer.camera.flyTo({
				destination: cameraPosition,
				orientation: {
					direction: direction,
					up: axisUp
				},
				duration: 0.8
			});
		}

		function resetInitialView() {
			if (!activeRectConfig) {
				return;
			}
			focusAlongSegmentAxis(activeRectConfig);
		}

		function configureOrthographicZoom() {
			viewer.scene.screenSpaceCameraController.enableZoom = false;
			popupHandler.setInputAction(function(movement) {
				const frustum = viewer.camera.frustum;
				if (!(frustum instanceof Cesium.OrthographicFrustum)) {
					return;
				}

				const delta = movement > 0 ? 0.88 : 1.12;
				frustum.width = Cesium.Math.clamp(frustum.width * delta, minOrthoWidth, maxOrthoWidth);
				viewer.scene.requestRender();
			}, Cesium.ScreenSpaceEventType.WHEEL);
		}

		async function main() {
			const rectConfig = normalizeRectConfig(parseRectanglePayload());
			if (!rectConfig) {
				alert("矩形パラメータが見つかりませんでした。");
				return;
			}
			updateSectionThicknessHud(rectConfig);
			activeRectConfig = rectConfig;

			const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4880598);
			viewer.scene.primitives.add(tileset);
			activeMeasureTileset = tileset;
			if (Cesium.defined(tileset.readyPromise)) {
				await tileset.readyPromise;
			}
			const baseModelMatrix = Cesium.Matrix4.clone(tileset.modelMatrix, new Cesium.Matrix4());

			function applyPointSize(pointSizeValue) {
				const requestedPointSize = Number(pointSizeValue);
				if (!Number.isFinite(requestedPointSize) || requestedPointSize <= 0) {
					return;
				}
				activeRectConfig.pointSize = requestedPointSize;
				tileset.style = new Cesium.Cesium3DTileStyle({
					pointSize: requestedPointSize.toString()
				});
				viewer.scene.requestRender();
			}

			const requestedPointSize = Number(activeRectConfig.pointSize);
			applyPointSize(requestedPointSize);
			applyExternalPointSize = applyPointSize;
			if (Number.isFinite(pendingPointSize)) {
				applyPointSize(pendingPointSize);
				pendingPointSize = null;
			}

			let inverted = false;
			let deformed = false;
			let currentDeformMatrix = Cesium.Matrix4.clone(Cesium.Matrix4.IDENTITY, new Cesium.Matrix4());
			function applyClipping() {
				const clippingConfig = buildClippingPlanes(activeRectConfig, inverted);
				const clippingModelMatrix = buildClippingModelMatrixForTileset(activeRectConfig, tileset, baseModelMatrix);
				tileset.clippingPlanes = new Cesium.ClippingPlaneCollection({
					planes: clippingConfig.planes,
					unionClippingRegions: clippingConfig.unionClippingRegions,
					modelMatrix: clippingModelMatrix,
					edgeWidth: 1.0,
					edgeColor: Cesium.Color.YELLOW
				});
				viewer.scene.requestRender();
			}

			function applyVisualMode() {
				if (deformed) {
					const widthScale = Number.isFinite(Number(activeRectConfig.deformWidthScale)) ? Number(activeRectConfig.deformWidthScale) : 0.45;
					const alongScale = Number.isFinite(Number(activeRectConfig.deformAlongScale)) ? Number(activeRectConfig.deformAlongScale) : 1.0;
					const heightScale = Number.isFinite(Number(activeRectConfig.deformHeightScale)) ? Number(activeRectConfig.deformHeightScale) : 2.2;
					currentDeformMatrix = buildDeformMatrix(activeRectConfig, widthScale, alongScale, heightScale);
				} else {
					currentDeformMatrix = Cesium.Matrix4.clone(Cesium.Matrix4.IDENTITY, new Cesium.Matrix4());
				}

				applyDeformation(tileset, baseModelMatrix, activeRectConfig, deformed);
				clipInverted = inverted;
				clipDeformed = deformed;
				clipDeformMatrix = Cesium.Matrix4.clone(currentDeformMatrix, new Cesium.Matrix4());
				clipDeformInverseMatrix = Cesium.Matrix4.inverse(currentDeformMatrix, new Cesium.Matrix4());
				applyClipping();
				renderMeasurement();
			}

			applyVisualMode();

			document.getElementById("invertBtn").addEventListener("click", function() {
				inverted = !inverted;
				clipInverted = inverted;
				applyClipping();
			});
			document.getElementById("deformBtn").addEventListener("click", function() {
				deformed = !deformed;
				this.textContent = deformed ? "デフォルメ ON" : "デフォルメ OFF";
				applyVisualMode();
			});
			document.getElementById("resetViewBtn").addEventListener("click", function() {
				resetInitialView();
			});

			const center = vecFromArray(activeRectConfig.center);
			const dimensions = vecFromArray(activeRectConfig.dimensions);
			const axisX = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisX), new Cesium.Cartesian3());
			const axisY = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisY), new Cesium.Cartesian3());
			const axisZ = Cesium.Cartesian3.normalize(vecFromArray(activeRectConfig.axisZ), new Cesium.Cartesian3());
			const rotation = new Cesium.Matrix3(
				axisX.x, axisY.x, axisZ.x,
				axisX.y, axisY.y, axisZ.y,
				axisX.z, axisY.z, axisZ.z
			);
			const orientation = Cesium.Quaternion.fromRotationMatrix(rotation);

			const boxEntity = viewer.entities.add({
				position: center,
				orientation: orientation,
				box: {
					dimensions: dimensions,
					fill: false,
					outline: true,
					outlineColor: Cesium.Color.CYAN
				}
			});

			applyExternalSectionThickness = function(sectionThicknessMm) {
				if (!activeRectConfig || !Array.isArray(activeRectConfig.dimensions) || activeRectConfig.dimensions.length !== 3) {
					return;
				}

				const clampedMm = Cesium.Math.clamp(Number(sectionThicknessMm), 50, 300);
				const thicknessM = clampedMm / 1000;
				activeRectConfig.sectionThicknessMm = clampedMm;
				activeRectConfig.sectionThicknessM = thicknessM;
				activeRectConfig.dimensions[1] = thicknessM;
				updateSectionThicknessHud(activeRectConfig);

				if (boxEntity && boxEntity.box) {
					boxEntity.box.dimensions = vecFromArray(activeRectConfig.dimensions);
				}

				applyVisualMode();
				viewer.scene.requestRender();
			};

			if (Number.isFinite(pendingSectionThicknessMm)) {
				applyExternalSectionThickness(pendingSectionThicknessMm);
				pendingSectionThicknessMm = null;
			}

			resetInitialView();
			configureOrthographicZoom();
			configureMeasurementMode();
		}

		main().catch(function(error) {
			console.error("Clip window initialization failed:", error);
			const details = error && error.message ? "\n" + error.message : "";
			alert("別ウィンドウの初期化に失敗しました。コンソールを確認してください。" + details);
		});
	</script>
</body>
